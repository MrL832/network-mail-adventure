name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: network-mail-adventure/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: network-mail-adventure
        run: pnpm install --no-frozen-lockfile

      - name: Build
        working-directory: network-mail-adventure
        env:
          PORT: "3000"
          BASE_PATH: "/${{ github.event.repository.name }}/"
        run: pnpm --filter @workspace/postal-tcp-ip run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: network-mail-adventure/artifacts/postal-tcp-ip/dist/public

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
